<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Comando v4.0 - Integrado</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("avO3v8VXJm6ZQyZ9a");
        })();
    </script>
</head>
<body>
    <div id="login-screen" class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <h1>Centro de Comando - Integrado</h1>
        <button id="login-btn" class="add-btn">Entrar com Google</button>
    </div>

    <div id="app-screen" class="container" style="display: none;">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="saudacao">Olá, Paulo</h2>
                <button onclick="logout()" class="btn-delete">Sair</button>
            </div>
            <nav style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="showSection('novo-projeto')" id="btn-nav-novo" class="btn-nav" style="display:none;">➕ Novo Projeto / Demanda</button>
                <button onclick="showSection('acompanhamento')" class="btn-nav">📊 Acompanhamento</button>
                <button onclick="showSection('usuarios')" id="btn-nav-usuarios" class="btn-nav" style="display:none; background-color: #475569;">👥 Gestão de Equipe</button>
            </nav>
        </header>

        <section id="sec-novo-projeto" class="content-section" style="display: none;">
            <div class="input-section">
                <h3>Inclusão de Demanda Estratégica</h3>
                
                <label style="font-size: 0.85rem; font-weight: bold;">Área Estratégica:</label>
                <div class="form-row">
                    <select id="areaSelect" style="width: 100%;">
                        <option value="Coordenação">Coordenação</option>
                        <option value="Docência">Docência</option>
                        <option value="DEA">DEA</option>
                        <option value="Pessoal">Pessoal</option>
                    </select>
                </div>

                <label style="font-size: 0.85rem; font-weight: bold;">Projeto (Selecione ou digite um novo):</label>
                <div class="form-row">
                    <input type="text" id="projectInput" list="projectsList" placeholder="Ex: C.A.F.E. 2026" style="width: 100%;">
                    <datalist id="projectsList"></datalist>
                </div>

                <input type="text" id="taskTitle" placeholder="Título da Tarefa">
                <textarea id="taskDesc" placeholder="Descrição detalhada..." rows="3"></textarea>
                
                <div id="responsaveis-container">
                    <div class="resp-row" style="display: flex; gap: 5px; margin-bottom: 5px;">
                        <input type="text" class="resp-name" placeholder="Nome Responsável">
                        <input type="email" class="resp-email" placeholder="E-mail do Google">
                    </div>
                </div>
                <button onclick="addResponsavelField()" class="btn-small" style="margin: 10px 0;">+ Adicionar outro responsável</button>
                
                <div class="form-row">
                    <input type="date" id="dateInput">
                    <button onclick="saveDemand()" class="add-btn">Lançar Demanda</button>
                </div>
            </div>
        </section>

        <section id="sec-acompanhamento" class="content-section" style="display: none;">
            <select id="filterProject" onchange="renderDashboard()" style="margin-bottom: 20px;"></select>
            <div id="stats-grid" class="stats-grid"></div>
            <div id="riscos-alerta" class="alert-box" style="display: none;"></div>
            <div style="max-width: 250px; margin: auto;"><canvas id="mainChart"></canvas></div>
        </section>

        <section id="sec-usuarios" class="content-section" style="display: none;">
            <div class="input-section">
                <h3>Cadastrar Novo Membro na Equipe</h3>
                <div class="form-row" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="novoUserNome" placeholder="Nome Completo" style="flex: 1;">
                    <input type="email" id="novoUserEmail" placeholder="E-mail do Google (@gmail ou @grupointegrado)" style="flex: 2;">
                    <select id="novoUserPapel" style="flex: 1;">
                        <option value="executor">Executor (Visualiza e relata)</option>
                        <option value="gestor">Gestor (Cria projetos e aprova)</option>
                    </select>
                </div>
                <button onclick="cadastrarUsuario()" class="add-btn" style="margin-top: 10px;">Liberar Acesso</button>
            </div>
            <hr>
            <h3>Equipe Credenciada</h3>
            <div id="lista-usuarios-board" style="margin-top: 15px;"></div>
        </section>

        <hr>
        <div id="projectsBoard"></div>
    </div>

    <div id="taskModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Gestão da Tarefa</h3>
            <label>Título:</label>
            <input type="text" id="editTitle">
            
            <label>Descrição/Report:</label>
            <textarea id="editDesc" rows="4"></textarea>
            
            <label>Prazo:</label>
            <input type="date" id="editDate">

            <label>Status:</label>
            <select id="editStatus">
                <option value="fazer">A Fazer</option>
                <option value="andamento">Em Andamento</option>
                <option value="aprovacao">Aguardando OK Gestor</option>
            </select>
            
            <div id="modalHistorico"></div>
            
            <div class="modal-actions">
                <button onclick="saveModalChanges()" class="add-btn">Salvar Alterações</button>
                <button onclick="deleteTask()" id="btn-delete-task" class="btn-delete">Excluir Demanda</button>
                <button onclick="closeModal()" style="background:#666; color:white;">Fechar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
