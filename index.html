<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Comando v3.5 - Gestão de Mim</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-screen" class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <h1>Centro de Comando - Integrado</h1>
        <button id="login-btn" class="add-btn">Entrar com Google</button>
    </div>

    <div id="app-screen" class="container" style="display: none;">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="saudacao">Olá, Paulo</h2>
                <button onclick="logout()" class="btn-delete">Sair</button>
            </div>
            <nav style="margin-top: 15px; display: flex; gap: 10px;">
                <button onclick="showSection('novo-projeto')" class="btn-nav">➕ Novo Projeto / Demanda</button>
                <button onclick="showSection('acompanhamento')" class="btn-nav">📊 Acompanhe seus Projetos</button>
            </nav>
        </header>

        <section id="sec-novo-projeto" class="content-section" style="display: none;">
            <div class="input-section">
                <h3>Inclusão de Demanda Estratégica</h3>
                <div class="form-row">
                    <select id="areaSelect">
                        <option value="Coordenação">Coordenação</option>
                        <option value="Docência">Docência</option>
                        <option value="DEA">DEA</option>
                        <option value="Pessoal">Pessoal</option>
                    </select>
                    <input type="text" id="projectInput" list="projectsList" placeholder="Projeto (Selecione ou digite novo)" style="flex:2">
                    <datalist id="projectsList"></datalist>
                </div>
                <input type="text" id="taskTitle" placeholder="Título da Tarefa">
                <textarea id="taskDesc" placeholder="Descrição detalhada..." rows="3"></textarea>
                
                <div id="responsaveis-container">
                    <div class="resp-row" style="display: flex; gap: 5px; margin-bottom: 5px;">
                        <input type="text" class="resp-name" placeholder="Nome Responsável">
                        <input type="email" class="resp-email" placeholder="E-mail">
                    </div>
                </div>
                <button onclick="addResponsavelField()" class="btn-small" style="margin: 10px 0;">+ Adicionar outro responsável</button>
                
                <div class="form-row">
                    <input type="date" id="dateInput">
                    <button onclick="saveDemand()" class="add-btn">Lançar Demanda</button>
                </div>
            </div>
        </section>

        <section id="sec-acompanhamento" class="content-section" style="display: none;">
            <select id="filterProject" onchange="renderDashboard()" style="margin-bottom: 20px;"></select>
            <div id="stats-grid" class="stats-grid"></div>
            <div id="riscos-alerta" class="alert-box" style="display: none;"></div>
            <div style="max-width: 250px; margin: auto;"><canvas id="mainChart"></canvas></div>
        </section>

        <hr>
        <div id="projectsBoard"></div>
    </div>

    <div id="taskModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Gestão da Tarefa</h3>
            <label>Título:</label>
            <input type="text" id="editTitle">
            
            <label>Descrição/Report:</label>
            <textarea id="editDesc" rows="4"></textarea>
            
            <label>Prazo:</label>
            <input type="date" id="editDate">

            <label>Status:</label>
            <select id="editStatus">
                <option value="fazer">A Fazer</option>
                <option value="andamento">Em Andamento</option>
                <option value="aprovacao">Aguardando OK Gestor</option>
            </select>
            
            <div id="modalHistorico"></div>
            
            <div class="modal-actions">
                <button onclick="saveModalChanges()" class="add-btn">Salvar Alterações</button>
                <button onclick="deleteTask()" class="btn-delete">Excluir Demanda</button>
                <button onclick="closeModal()" style="background:#666; color:white;">Fechar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
