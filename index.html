<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Comando - Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-screen" class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <h1>Acesso Restrito - Gestão Integrado</h1>
        <button id="login-btn" class="add-btn">Entrar com Google</button>
    </div>

    <div id="app-screen" class="container" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h2>Painel de Controle</h2>
            <div id="user-area">
                <span id="user-email" style="font-weight: bold; font-size: 0.8rem;"></span>
                <button onclick="logout()" class="btn-delete" style="padding: 5px 10px;">Sair</button>
            </div>
        </header>

        <section id="dashboard-section" style="display: none; margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 8px;">
            <h3>Visão Geral da Operação</h3>
            <div style="max-width: 300px; margin: auto;">
                <canvas id="statusChart"></canvas>
            </div>
        </section>

        <section id="admin-input" style="display: none;" class="input-section">
            <h3>Nova Demanda Estratégica</h3>
            <div class="form-row">
                <select id="areaSelect">
                    <option value="Coordenação">Coordenação</option>
                    <option value="Docência">Docência</option>
                    <option value="DEA">DEA</option>
                    <option value="Pessoal">Pessoal</option>
                </select>
                <input type="text" id="projectInput" placeholder="Projeto (Ex: ENADE 2026)">
            </div>
            <input type="text" id="taskInput" placeholder="Ação específica...">
            <div class="form-row">
                <input type="text" id="respInput" placeholder="Responsável">
                <input type="email" id="emailInput" placeholder="E-mail Institucional">
                <input type="date" id="dateInput">
                <button onclick="addTask()" class="add-btn">Delegar</button>
            </div>
        </section>

        <div id="projectsBoard"></div>
    </div>

    <div id="modal-detalhes" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="modal-titulo">Detalhes da Atividade</h3>
            <p><strong>Status Atual:</strong> <span id="modal-status-txt"></span></p>
            <label>Relatório de Execução / Descrição:</label>
            <textarea id="modal-desc" rows="5" placeholder="Descreva o que foi feito..."></textarea>
            
            <h4>Histórico de Reports</h4>
            <div id="modal-historico" style="max-height: 150px; overflow-y: auto; background: #eee; padding: 10px; font-size: 0.8rem; margin-bottom: 15px;"></div>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="salvarUpdate()" class="add-btn">Salvar Alterações</button>
                <button onclick="fecharModal()" class="btn-delete">Fechar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
